<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物業管理綜合服務報價系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            --primary-red: #B22222;
            --bg-cream: #FDF9F3;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }

        /* A4 橫式容器核心樣式 */
        .preview-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow: hidden;
        }

        .preview-container {
            width: 210mm;
            min-height: 297mm;
            height: auto;
            padding: 8mm 15mm;
            background-color: var(--bg-cream);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
            transform-origin: top center; /* 縮放基點 */
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .preview-wrapper {
                padding: 0;
                display: block;
            }
            .preview-container {
                width: 210mm;
                min-height: 297mm;
                transform: none !important;
                box-shadow: none;
                border: none;
                margin: 0;
            }
        }

        .price-text {
            color: var(--primary-red);
            font-weight: 800;
        }
        
        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #4b5563;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }

        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* 設定彈窗樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 高質感圖示漸層 */
        .icon-grad-manager { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .icon-grad-secretary { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        .icon-grad-cleaner { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
        .icon-grad-mechanic { background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); }
        .icon-grad-security { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    </style>
</head>
<body class="no-scrollbar">

    <!-- 頂部控制列 (手機版可見) -->
    <div class="no-print bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div id="nav-logo-container" class="w-8 h-8 bg-red-800 flex items-center justify-center text-white font-bold rounded text-xs overflow-hidden">
                <span id="nav-logo-text">NW</span>
                <img id="nav-logo-img" class="w-full h-full object-cover hidden" src="" alt="Logo">
            </div>
            <h2 class="text-lg font-bold text-gray-800">領標案場報價系統</h2>
        </div>
        <div class="flex gap-2">
            <button onclick="openSettings()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded font-bold text-sm hover:bg-gray-200 transition border border-gray-300">
                設定
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-red-700 text-white rounded font-bold text-sm hover:bg-red-800 transition">
                列印 / PDF
            </button>
        </div>
    </div>

    <!-- 設定彈窗 (Modal) -->
    <div id="settings-modal" class="modal-overlay no-print">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-black text-gray-800 flex items-center gap-2">
                    <i data-lucide="settings" class="w-6 h-6"></i> 版面與圖片設定
                </h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="space-y-8">
                <!-- Logo 設定 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-l-4 border-red-700 pl-2">系統 LOGO 設定</h3>
                    <div class="input-group">
                        <label>LOGO 圖片網址</label>
                        <input type="text" id="set-logo-url" placeholder="貼上 LOGO 網址" oninput="updatePositions()">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>水平偏移 (X)</label>
                            <input type="number" id="set-logo-x" value="0" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>垂直偏移 (Y)</label>
                            <input type="number" id="set-logo-y" value="0" oninput="updatePositions()">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Logo 縮放倍率</label>
                        <input type="range" id="set-logo-scale" min="0.5" max="2" step="0.1" value="1" oninput="updatePositions()">
                        <div class="text-[10px] text-gray-400 text-right mt-1">目前: <span id="val-logo-scale">1.0</span>x</div>
                    </div>
                </div>

                <!-- 職位圖示設定 -->
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 border-l-4 border-blue-700 pl-2">職位圖示與位置設定</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>經理圖示網址</label>
                            <input type="text" id="set-icon-url-0" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>秘書圖示網址</label>
                            <input type="text" id="set-icon-url-1" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>清潔圖示網址</label>
                            <input type="text" id="set-icon-url-2" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>機電圖示網址</label>
                            <input type="text" id="set-icon-url-3" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>保全圖示網址</label>
                            <input type="text" id="set-icon-url-4" oninput="updatePositions()">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div class="input-group">
                            <label>全體圖示水平偏移 (X)</label>
                            <input type="number" id="set-icon-x" value="0" oninput="updatePositions()">
                        </div>
                        <div class="input-group">
                            <label>全體圖示垂直偏移 (Y)</label>
                            <input type="number" id="set-icon-y" value="0" oninput="updatePositions()">
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t flex justify-end gap-3">
                    <button onclick="resetPositions()" class="px-4 py-2 text-gray-500 hover:text-gray-700 text-sm font-bold">
                        重設位置
                    </button>
                    <button onclick="closeSettings()" class="px-6 py-2 bg-gray-800 text-white rounded-lg font-bold text-sm hover:bg-black transition">
                        完成設定
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <!-- 左側編輯面板 (no-print) -->
        <div class="lg:w-[350px] space-y-6 no-print bg-white p-6 border-r shadow-inner h-screen overflow-y-auto">
            <div class="space-y-4">
                <div class="input-group">
                    <label>LOGO 圖片網址</label>
                    <input type="text" id="edit-logo-url" placeholder="例：https://.../logo.png">
                </div>
                <div class="input-group">
                    <label>社區名稱</label>
                    <input type="text" id="edit-community" placeholder="例：社區管理委員會">
                </div>
                <div class="input-group">
                    <label>標的地址</label>
                    <input type="text" id="edit-address" placeholder="例：桃園市...">
                </div>
                <div class="input-group">
                    <label>服務內容</label>
                    <input type="text" id="edit-service" placeholder="例：駐衛保全服務">
                </div>
                <div class="input-group">
                    <label>報價日期</label>
                    <input type="date" id="edit-date">
                </div>
                
                <hr class="my-4">
                
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-700">報價項目</h3>
                    <button onclick="addItem()" class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100">+ 新增</button>
                </div>
                <div id="items-editor" class="space-y-3">
                    <!-- 動態加入編輯項 -->
                </div>

                <hr class="my-4">

                <div class="input-group">
                    <label>報價說明 (每行一項)</label>
                    <textarea id="edit-notes" rows="4" class="text-xs"></textarea>
                </div>

                <div class="input-group">
                    <label>法規說明標題</label>
                    <input type="text" id="edit-compliance-title" placeholder="標題">
                </div>

                <div class="input-group">
                    <label>法規說明內容 (每行一項)</label>
                    <textarea id="edit-compliance-notes" rows="4" class="text-xs"></textarea>
                </div>

                <div class="input-group">
                    <label>承辦人姓名</label>
                    <input type="text" id="edit-contact" placeholder="姓名">
                </div>

                <div class="input-group">
                    <label>連絡電話</label>
                    <input type="text" id="edit-phone" placeholder="電話">
                </div>

                <hr class="my-4">
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-gray-700">歷史紀錄</h3>
                        <button onclick="saveRecord()" class="text-xs bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 transition shadow-sm">
                            儲存目前內容
                        </button>
                    </div>
                    <div id="history-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                        <!-- 歷史紀錄將在此處動態生成 -->
                        <p class="text-xs text-gray-400 italic text-center py-4">暫無儲存紀錄</p>
                    </div>
                </div>

                <div class="pt-4 space-y-2 border-t">
                    <button onclick="resetData()" class="w-full py-2 text-gray-400 hover:text-gray-600 text-xs underline">
                        重設為預設資料
                    </button>
                </div>
            </div>
        </div>

        <!-- 右側預覽區 (核心縮放邏輯在此) -->
        <div class="flex-1 bg-gray-200 overflow-auto preview-wrapper" id="preview-wrapper">
            <div id="quotation-page" class="preview-container">
                
                <!-- 頁首：Logo 與 標題 -->
                <div class="mb-0">
                    <div id="view-logo-container" class="w-full overflow-hidden bg-transparent">
                        <img id="view-logo-img" class="w-full h-auto object-contain" src="00.png" alt="Company Header">
                        <span id="view-logo-text" class="hidden"></span>
                    </div>
                </div>

                <!-- 主資訊欄位 -->
                <div class="grid grid-cols-12 gap-4 border-b-2 border-gray-800 pt-0 pb-6 mb-4">
                    <div class="col-span-7 space-y-4">
                        <p class="text-base font-bold text-gray-600">日期：<span id="view-date" class="font-normal"></span></p>
                        <p class="text-2xl font-bold">致：<span id="view-community" class="text-blue-700"></span></p>
                        <p class="text-base font-bold">標的：<span id="view-address" class="font-normal"></span></p>
                        <p class="text-base font-bold">服務：<span id="view-service" class="font-normal"></span></p>
                    </div>
                    <div class="col-span-5 text-right flex flex-col justify-end">
                        <div class="flex flex-col justify-end">
                            <p class="text-sm font-bold text-gray-600">每月服務總計 (含稅)：</p>
                            <p class="text-5xl price-text my-2 leading-none">$ <span id="view-total">0</span></p>
                            <p class="text-base font-bold text-gray-800 whitespace-nowrap">新台幣 <span id="view-total-chinese"></span></p>
                            <p class="text-xs font-bold text-gray-500 mt-1">
                                (服務小計：$<span id="view-subtotal">0</span> | 5% 稅金：$<span id="view-tax">0</span>)
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 職位表格清單 -->
                <div id="view-items-list" class="space-y-1">
                    <!-- 動態職位內容 -->
                </div>

                <!-- 底部說明區 -->
                <div class="grid grid-cols-2 gap-6 border-t-2 border-gray-800 mt-4 pt-4">
                    <!-- 左側：報價說明 -->
                    <div class="space-y-1">
                        <p class="text-sm font-black text-gray-800 border-b pb-1">備註：</p>
                        <ul id="view-notes" class="text-sm space-y-1 font-bold text-gray-700">
                            <!-- 動態說明內容 -->
                        </ul>
                    </div>

                    <!-- 右側：法規說明 -->
                    <div class="bg-orange-50 p-4 border border-orange-200 rounded-sm">
                        <h4 id="view-compliance-title" class="text-sm font-black mb-2 border-b border-orange-200 pb-1 whitespace-nowrap"></h4>
                        <ul id="view-compliance-list" class="text-xs space-y-1.5 text-gray-700 font-bold">
                            <!-- 動態法規內容 -->
                        </ul>
                    </div>
                </div>

                <!-- 簽章與承辦人 -->
                <div class="grid grid-cols-3 gap-6 mt-6 pb-4">
                    <div class="border border-gray-400 h-[154px] p-2 text-xs font-bold text-gray-400 rounded-sm relative overflow-hidden text-left">
                        <span class="relative z-10">西北保全確認章</span>
                        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 pointer-events-none z-0">
                            <img src="06.png" class="w-[120px] h-[120px] object-contain opacity-90 border border-gray-200 p-0.5" alt="西北保全印章">
                        </div>
                    </div>
                    <div class="border border-gray-400 h-[154px] p-2 text-xs font-bold text-gray-400 rounded-sm relative overflow-hidden text-left">
                        <span class="relative z-10">西北公寓確認章</span>
                        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 pointer-events-none z-0">
                            <img src="07.png" class="w-[120px] h-[120px] object-contain opacity-90 border border-gray-200 p-0.5" alt="西北公寓印章">
                        </div>
                    </div>
                    <div class="border border-gray-400 h-[154px] p-2 text-xs font-bold text-gray-400 rounded-sm flex flex-col justify-start items-start">
                        <span>報價承辦單位</span>
                        <div class="flex-1 w-full flex flex-col justify-center items-end text-gray-800 pr-2">
                            <p class="text-xs font-bold text-red-800">承辦人：<span id="view-contact" class="text-sm"></span></p>
                            <p class="text-xs font-bold text-red-800 mt-1">專線：<span id="view-phone"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 獲取在地日期的 YYYY-MM-DD 格式
        const getLocalDate = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };
        const today = getLocalDate();

        const availableIcons = [
            { label: "經理", icon: "01.png", color: "bg-blue-50" },
            { label: "秘書", icon: "02.png", color: "bg-purple-50" },
            { label: "清潔", icon: "03.png", color: "bg-emerald-50" },
            { label: "機電", icon: "04.png", color: "bg-orange-50" },
            { label: "保全", icon: "05.png", color: "bg-red-50" },
            { label: "人像1", icon: "11.png", color: "bg-gray-50" },
            { label: "人像2", icon: "12.png", color: "bg-gray-50" },
            { label: "人像3", icon: "13.png", color: "bg-gray-50" },
            { label: "人像4", icon: "14.png", color: "bg-gray-50" },
            { label: "人像5", icon: "15.png", color: "bg-gray-50" }
        ];

        // 初始與預設資料
        const defaultData = {
            logoUrl: "00.png", 
            logoPos: { x: 0, y: 0, scale: 1 }, 
            iconPos: { x: 0, y: 0 }, 
            community: "巨星生活家社區管理委員會",
            address: "桃園市八德區高城八街62號",
            service: "巨星生活家社區物業管理暨駐衛保全服務",
            date: today,
            contact: "楊蕙芳",
            phone: "03-302-6868",
            items: [
                { role: "社區經理", count: 1, desc: "每日上班 8 小時 (週休二天，依勞基法休)", price: 65000, icon: "01.png" },
                { role: "財務秘書", count: 1, desc: "每日上班 8 小時 (週休二天，依勞基法休)", price: 50000, icon: "02.png" },
                { role: "保全 2 哨", count: 6, desc: "每日上班 8 小時 (全年無休)", price: 50000, icon: "05.png" }
            ],
            notes: [
                "本報價均以「月」為計費單位",
                "包含派駐現場人員之全額薪資",
                "涵蓋勞健保費用及 6% 勞工退休金",
                "包含完善專業教育訓練費用",
                "提供人員節日獎金 (春節、中秋、生日)"
            ],
            complianceTitle: "ISO 9001 國際品質認證 / 勞基法規遵循保證",
            complianceNotes: [
                "勞動部 115 年 1 月 1 日起薪資基準",
                "2026 工資調幅：3.18%",
                "法定月薪：$29,500 | 法定時薪：$196",
                "(註：本報價已完全符合並吸收上述法定薪資調漲成本)"
            ]
        };

        let data = JSON.parse(JSON.stringify(defaultData));

        // 載入 LocalStorage
        const saved = localStorage.getItem('property_quote_data_v2');
        if (saved) {
            data = JSON.parse(saved);
        }

        // 初始化編輯器
        function initEditor() {
            // 如果日期是舊的預設值或不存在，則更新為今天
            if (!data.date || data.date === "2026-03-30") {
                data.date = today;
            }

            document.getElementById('edit-logo-url').value = data.logoUrl || "";
            document.getElementById('edit-community').value = data.community;
            document.getElementById('edit-address').value = data.address;
            document.getElementById('edit-service').value = data.service;
            document.getElementById('edit-date').value = data.date;
            document.getElementById('edit-contact').value = data.contact;
            document.getElementById('edit-phone').value = data.phone || "";
            document.getElementById('edit-notes').value = data.notes.join('\n');
            document.getElementById('edit-compliance-title').value = data.complianceTitle || "";
            document.getElementById('edit-compliance-notes').value = (data.complianceNotes || []).join('\n');
            
            // 初始化設定彈窗的值
            document.getElementById('set-logo-url').value = data.logoUrl || "";
            if (data.logoPos) {
                document.getElementById('set-logo-x').value = data.logoPos.x;
                document.getElementById('set-logo-y').value = data.logoPos.y;
                document.getElementById('set-logo-scale').value = data.logoPos.scale;
                document.getElementById('val-logo-scale').innerText = data.logoPos.scale;
            }
            if (data.iconPos) {
                document.getElementById('set-icon-x').value = data.iconPos.x;
                document.getElementById('set-icon-y').value = data.iconPos.y;
            }

            // 初始化職位圖示網址
            availableIcons.forEach((icon, index) => {
                const input = document.getElementById(`set-icon-url-${index}`);
                if (input) input.value = icon.icon;
            });

            renderItemsEditor();
            renderHistoryList();
            updatePreview();
            handleResize(); // 初始縮放
        }

        // 設定彈窗邏輯
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function updatePositions() {
            // 更新網址
            data.logoUrl = document.getElementById('set-logo-url').value;
            document.getElementById('edit-logo-url').value = data.logoUrl; // 同步到左側面板

            availableIcons.forEach((icon, index) => {
                const input = document.getElementById(`set-icon-url-${index}`);
                if (input) {
                    const oldIcon = icon.icon;
                    icon.icon = input.value;
                    // 如果原本選取的是該圖示，則更新項目資料
                    data.items.forEach(item => {
                        if (item.icon === oldIcon) item.icon = icon.icon;
                    });
                }
            });

            data.logoPos = {
                x: parseInt(document.getElementById('set-logo-x').value) || 0,
                y: parseInt(document.getElementById('set-logo-y').value) || 0,
                scale: parseFloat(document.getElementById('set-logo-scale').value) || 1
            };
            data.iconPos = {
                x: parseInt(document.getElementById('set-icon-x').value) || 0,
                y: parseInt(document.getElementById('set-icon-y').value) || 0
            };
            
            document.getElementById('val-logo-scale').innerText = data.logoPos.scale;
            renderItemsEditor(); // 重新渲染編輯器以更新圖示按鈕
            updatePreview();
        }

        function resetPositions() {
            document.getElementById('set-logo-x').value = 0;
            document.getElementById('set-logo-y').value = 0;
            document.getElementById('set-logo-scale').value = 1;
            document.getElementById('set-icon-x').value = 0;
            document.getElementById('set-icon-y').value = 0;
            
            // 重設為本地預設圖示
            const localIcons = ['01.png', '02.png', '03.png', '04.png', '05.png'];
            availableIcons.forEach((icon, index) => {
                icon.icon = localIcons[index];
                document.getElementById(`set-icon-url-${index}`).value = icon.icon;
            });

            updatePositions();
        }

        // 歷史紀錄管理
        function saveRecord() {
            const community = document.getElementById('edit-community').value || "未命名社區";
            const date = new Date().toLocaleString('zh-TW', { 
                month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' 
            });
            const recordName = `${community} (${date})`;
            
            const history = JSON.parse(localStorage.getItem('property_quote_history') || '[]');
            history.unshift({
                id: Date.now(),
                name: recordName,
                data: JSON.parse(JSON.stringify(data))
            });
            
            // 最多保留 20 筆紀錄
            if (history.length > 20) history.pop();
            
            localStorage.setItem('property_quote_history', JSON.stringify(history));
            renderHistoryList();
            alert('紀錄已儲存！');
        }

        function renderHistoryList() {
            const container = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('property_quote_history') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">暫無儲存紀錄</p>';
                return;
            }
            
            container.innerHTML = history.map(record => `
                <div class="p-2 bg-gray-50 border rounded text-xs flex justify-between items-center group hover:border-blue-300 transition">
                    <div class="flex-1 truncate mr-2" title="${record.name}">
                        <span class="font-bold text-gray-700">${record.name}</span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                        <button onclick="loadRecord(${record.id})" class="px-2 py-1 bg-blue-500 text-white rounded text-[10px] hover:bg-blue-600">恢復</button>
                        <button onclick="deleteRecord(${record.id})" class="px-2 py-1 bg-gray-200 text-gray-600 rounded text-[10px] hover:bg-red-500 hover:text-white">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function loadRecord(id) {
            if (!confirm('恢復此紀錄將覆蓋目前正在編輯的內容，確定嗎？')) return;
            
            const history = JSON.parse(localStorage.getItem('property_quote_history') || '[]');
            const record = history.find(r => r.id === id);
            
            if (record) {
                data = JSON.parse(JSON.stringify(record.data));
                initEditor(); // 重新初始化所有欄位
                alert('紀錄已恢復！');
            }
        }

        function deleteRecord(id) {
            if (!confirm('確定要刪除此紀錄嗎？')) return;
            
            let history = JSON.parse(localStorage.getItem('property_quote_history') || '[]');
            history = history.filter(r => r.id !== id);
            localStorage.setItem('property_quote_history', JSON.stringify(history));
            renderHistoryList();
        }

        // 響應式縮放邏輯
        function handleResize() {
            if (window.innerWidth >= 1024) { // 桌面模式
                const wrapper = document.getElementById('preview-wrapper');
                const container = document.getElementById('quotation-page');
                const wrapperWidth = wrapper.offsetWidth - 40; // 減去 padding
                const containerWidth = 1122.5; // 297mm 轉 px 大約值

                if (wrapperWidth < containerWidth) {
                    const scale = wrapperWidth / containerWidth;
                    container.style.transform = `scale(${scale})`;
                    // 調整 wrapper 的高度以配合縮放後的內容，避免下方留白過多或被切掉
                    wrapper.style.minHeight = `${210 * scale}mm`;
                } else {
                    container.style.transform = 'scale(1)';
                    wrapper.style.minHeight = 'auto';
                }
            } else { // 移動端
                const container = document.getElementById('quotation-page');
                const scale = (window.innerWidth - 20) / 1122.5;
                container.style.transform = `scale(${scale})`;
            }
        }

        window.addEventListener('resize', handleResize);

        function renderItemsEditor() {
            const container = document.getElementById('items-editor');
            container.innerHTML = '';
            data.items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "p-3 bg-gray-50 border rounded-lg space-y-2 relative shadow-sm";
                
                let iconButtons = availableIcons.map(iconObj => `
                    <button onclick="updateItem(${index}, 'icon', '${iconObj.icon}')" 
                            class="w-10 h-10 flex items-center justify-center rounded-lg border overflow-hidden ${item.icon === iconObj.icon ? 'ring-2 ring-blue-500 border-transparent shadow-md' : 'border-gray-200'} hover:scale-105 transition duration-200"
                            title="${iconObj.label}">
                        <img src="${iconObj.icon}" class="w-full h-full object-cover">
                    </button>
                `).join('');

                div.innerHTML = `
                    <button onclick="removeItem(${index})" class="absolute top-1 right-2 text-gray-400 hover:text-red-500 text-lg">×</button>
                    <div class="space-y-2 mb-2">
                        <div class="flex items-start gap-2">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-2">Icon</span>
                            <div class="flex flex-wrap gap-1.5 flex-1">
                                ${iconButtons}
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="text" value="${item.icon}" onchange="updateItem(${index}, 'icon', this.value)" 
                                   class="text-[10px] p-1 w-full border rounded bg-white" placeholder="或貼上自定義圖示網址">
                        </div>
                    </div>
                    <input type="text" value="${item.role}" onchange="updateItem(${index}, 'role', this.value)" class="text-xs font-bold p-1 w-full bg-transparent border-b" placeholder="職稱">
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <span class="text-[10px] text-gray-400">人數</span>
                            <input type="number" value="${item.count}" onchange="updateItem(${index}, 'count', this.value)" class="text-xs p-1 w-full border rounded">
                        </div>
                        <div class="flex-[2]">
                            <span class="text-[10px] text-gray-400">單價</span>
                            <input type="number" value="${item.price}" onchange="updateItem(${index}, 'price', this.value)" class="text-xs p-1 w-full border rounded">
                        </div>
                    </div>
                    <textarea onchange="updateItem(${index}, 'desc', this.value)" class="text-[10px] p-1 w-full border rounded" rows="1" placeholder="工作描述">${item.desc}</textarea>
                `;
                container.appendChild(div);
            });
        }

        function addItem() {
            data.items.push({ role: "新職稱", count: 1, desc: "工作描述文字", price: 30000, icon: "https://api.dicebear.com/7.x/avataaars/svg?seed=new" });
            renderItemsEditor();
            updatePreview();
        }

        function removeItem(index) {
            data.items.splice(index, 1);
            renderItemsEditor();
            updatePreview();
        }

        function updateItem(index, field, value) {
            data.items[index][field] = (field === 'count' || field === 'price') ? Number(value) : value;
            if (field === 'icon') renderItemsEditor(); // 更新按鈕選取狀態
            updatePreview();
        }

        function updatePreview() {
            data.logoUrl = document.getElementById('edit-logo-url').value;
            data.community = document.getElementById('edit-community').value;
            data.address = document.getElementById('edit-address').value;
            data.service = document.getElementById('edit-service').value;
            data.date = document.getElementById('edit-date').value;
            data.contact = document.getElementById('edit-contact').value;
            data.phone = document.getElementById('edit-phone').value;
            data.notes = document.getElementById('edit-notes').value.split('\n').filter(n => n.trim() !== '');
            data.complianceTitle = document.getElementById('edit-compliance-title').value;
            data.complianceNotes = document.getElementById('edit-compliance-notes').value.split('\n').filter(n => n.trim() !== '');

            // 更新 LOGO 顯示
            const updateLogoElement = (imgId, textId, containerId, url) => {
                const img = document.getElementById(imgId);
                const text = document.getElementById(textId);
                const container = document.getElementById(containerId);
                
                if (!img || !text || !container) return; // 確保元素存在
                
                if (url && url.trim() !== "") {
                    img.src = url;
                    img.classList.remove('hidden');
                    text.classList.add('hidden');
                    container.classList.remove('bg-red-800');
                    container.classList.add('bg-transparent');
                } else {
                    img.src = "";
                    img.classList.add('hidden');
                    text.classList.remove('hidden');
                    container.classList.add('bg-red-800');
                    container.classList.remove('bg-transparent');
                }
            };

            updateLogoElement('nav-logo-img', 'nav-logo-text', 'nav-logo-container', data.logoUrl);
            // 頁首圖片固定顯示 00.png
            updateLogoElement('view-logo-img', 'view-logo-text', 'view-logo-container', "00.png");

            // 套用位置微調
            const logoView = document.getElementById('view-logo-container');
            if (data.logoPos) {
                logoView.style.transform = `translate(${data.logoPos.x}px, ${data.logoPos.y}px) scale(${data.logoPos.scale})`;
            }

            document.getElementById('view-community').innerText = data.community;
            document.getElementById('view-address').innerText = data.address;
            document.getElementById('view-service').innerText = data.service;
            document.getElementById('view-date').innerText = data.date;
            document.getElementById('view-contact').innerText = data.contact;
            document.getElementById('view-phone').innerText = data.phone || "";

            const itemList = document.getElementById('view-items-list');
            itemList.innerHTML = '';
            let subtotal = 0;

            data.items.forEach(item => {
                const lineTotal = item.count * item.price;
                subtotal += lineTotal;
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between border-b border-gray-300 last:border-b-0 last:pb-0 h-[56px] overflow-hidden";
                
                const iconTransform = data.iconPos ? `translate(${data.iconPos.x}px, ${data.iconPos.y}px)` : '';

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                         <div class="w-[50px] h-[50px] bg-gray-50 rounded-lg flex items-center justify-center overflow-hidden shadow-sm border border-gray-200 ring-2 ring-white flex-shrink-0" style="transform: ${iconTransform}">
                            <img src="${item.icon || 'https://api.dicebear.com/7.x/avataaars/svg?seed=default'}" class="w-full h-full object-cover">
                         </div>
                         <div class="flex-1 min-w-0">
                            <div class="text-lg font-black text-gray-800 break-words leading-tight">${item.role} <span class="text-xs font-bold text-gray-500 ml-1">(${item.count} 人)</span></div>
                            <div class="text-[11px] font-bold text-gray-500 break-words leading-tight">${item.desc}</div>
                         </div>
                    </div>
                    <div class="text-right flex-shrink-0 ml-4">
                        <span class="text-[11px] font-bold text-gray-400 block">單價: $${item.price.toLocaleString()}</span>
                        <span class="text-xl font-black price-text tracking-tight leading-tight">$ ${lineTotal.toLocaleString()}</span>
                    </div>
                `;
                itemList.appendChild(div);
            });

            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + tax;

            document.getElementById('view-subtotal').innerText = subtotal.toLocaleString();
            document.getElementById('view-tax').innerText = tax.toLocaleString();
            document.getElementById('view-total').innerText = total.toLocaleString();
            document.getElementById('view-total-chinese').innerText = numberToChinese(total);

            const notesList = document.getElementById('view-notes');
            notesList.innerHTML = '';
            data.notes.forEach(note => {
                const li = document.createElement('li');
                li.className = "flex items-start gap-2";
                li.innerHTML = `<span class="text-red-700 text-[10px] mt-0.5">●</span> ${note}`;
                notesList.appendChild(li);
            });

            // 更新法規說明
            document.getElementById('view-compliance-title').innerText = data.complianceTitle;
            const complianceList = document.getElementById('view-compliance-list');
            complianceList.innerHTML = '';
            data.complianceNotes.forEach(note => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-1";
                li.innerHTML = `<span class="text-red-700">▶</span> ${note}`;
                complianceList.appendChild(li);
            });

            localStorage.setItem('property_quote_data_v2', JSON.stringify(data));
            
            // 重新初始化 Lucide 圖示
            setTimeout(() => lucide.createIcons(), 0);
        }

        function numberToChinese(n) {
            const digit = ['零', '壹', '貳', '參', '肆', '伍', '陸', '柒', '捌', '玖'];
            const unit = [ ['元', '萬', '億'], ['', '拾', '佰', '仟'] ];
            let s = '整';
            n = Math.floor(n);
            for (let i = 0; i < unit[0].length && n > 0; i++) {
                let p = '';
                for (let j = 0; j < unit[1].length && n > 0; j++) {
                    p = digit[n % 10] + unit[1][j] + p;
                    n = Math.floor(n / 10);
                }
                s = p.replace(/(零.)*零$/, '').replace(/^$/, '零') + unit[0][i] + s;
            }
            return s.replace(/(零.)*零元/, '元').replace(/(零.)+/g, '零').replace(/^整$/, '零元整');
        }

        function resetData() {
            if(confirm('確定要清除所有內容並恢復預設值嗎？')) {
                localStorage.removeItem('property_quote_data_v2');
                location.reload();
            }
        }

        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        window.onload = initEditor;
    </script>
</body>
</html>
